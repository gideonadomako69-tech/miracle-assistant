name: Build Miracle APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          build-essential \
          libssl-dev \
          libffi-dev \
          libsqlite3-dev \
          wget \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake
        pip3 install buildozer cython

    - name: Build APK
      run: |
        buildozer android debug 2>&1 | tail -100

    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: Miracle-APK
        path: bin/*.apk
